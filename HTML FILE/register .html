<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FoodFrame Studio</title>

    <link rel="stylesheet" href="../CSS FILE/css file register.css">
</head>

<body>

    <!-- Background -->
    <div class="background-blur"></div>

    <!-- Register Container -->
    <div class="register-container">

        <div class="register-card">

            <!-- Logo -->
            <div class="logo-area">

                <h1>
                    FOOD<span>FRAME</span>
                </h1>

                <p>
                    Buat Akun FoodFrame Studio
                </p>

            </div>

            <!-- Form Register -->
            <form id="registerForm">

                <div class="input-group">

                    <label>Nama Lengkap</label>

                    <input
                        type="text"
                        id="nama"
                        placeholder="Masukkan Nama Lengkap"
                        required>

                </div>

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Masukkan Email"
                        required>

                </div>

                <div class="input-group">

                    <label>No WhatsApp</label>

                    <input
                        type="text"
                        id="whatsapp"
                        placeholder="Masukkan Nomor WhatsApp"
                        required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="password"
                        placeholder="Masukkan Password"
                        required>

                </div>

                <div class="input-group">

                    <label>Konfirmasi Password</label>

                    <input
                        type="password"
                        id="konfirmasi"
                        placeholder="Ulangi Password"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn-register">

                    Daftar Sekarang

                </button>

                <!-- Pesan Sukses -->
                <p id="registerMessage"></p>

            </form>

            <!-- Link Login -->
            <div class="login-link">

                Sudah punya akun?

                <a href="./halaman login.html">
                    Login
                </a>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="../JAVA SCRPT/register.js"></script>

</body>

</html>
