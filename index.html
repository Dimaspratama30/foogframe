<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodFrame Studio</title>

    <link rel="stylesheet" href="./CSS FILE/css file login.css">
</head>

<body>

    <!-- Background -->
    <div class="background-blur"></div>

    <!-- Login Container -->
    <div class="login-container">

        <div class="login-card">

            <div class="logo-area">

                <h1>
                    FOOD<span>FRAME</span>
                </h1>

                <p>
                    Jasa Fotografi Makanan & Minuman Profesional
                </p>

            </div>

            <form id="loginForm">

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        id="loginEmail"
                        placeholder="Masukkan Email"
                        required>

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input
                        type="password"
                        id="loginPassword"
                        placeholder="Masukkan Password"
                        required>

                </div>

                <button type="submit" class="btn-login">

                    Login

                </button>

            </form>

            <div class="register-link">

                Belum punya akun?

                <a href="./HTML FILE/register .html">
                    Daftar Sekarang
                </a>

            </div>

        </div>

    </div>

    <script src="./JAVA SCRPT/java script dari login.js"></script>

</body>

</html>
